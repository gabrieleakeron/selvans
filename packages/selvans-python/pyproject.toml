[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "selvans"
version = "0.1.0"
description = "Python client library for Selvans-compliant backends — connects to selvans-core"
readme = "README.md"
requires-python = ">=3.11"
keywords = ["mcp", "ai", "agents", "selvans", "fastapi"]
dependencies = [
    "fastapi[standard]==0.124.2",
    "uvicorn==0.38.0",
    "websockets>=12.0",
    "anthropic>=0.30.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "httpx>=0.27.0",
]

[tool.hatch.build.targets.wheel]
packages = ["selvans"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
